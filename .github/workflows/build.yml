name: Build & Release SolarGuard APK

on:
  # Trigger on version tags like v1.0.0, v1.2.3
  push:
    tags:
      - 'v*.*.*'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 4. Set up EAS CLI ─────────────────────────────────────────────────
      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── 5. Determine build profile ────────────────────────────────────────
      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "profile=preview" >> $GITHUB_OUTPUT
          fi

      # ── 6. Build APK via EAS ──────────────────────────────────────────────
      - name: Build Android APK (EAS)
        run: |
          eas build \
            --platform android \
            --profile ${{ steps.profile.outputs.profile }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 7. Wait for build and download artifact ───────────────────────────
      - name: Wait for build and get download URL
        id: build_url
        run: |
          echo "Build submitted to EAS. Check https://expo.dev for build status."
          echo "APK download link will appear in the EAS dashboard when complete."

      # ── 8. Create GitHub Release (on tag push) ────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SolarGuard ${{ github.ref_name }}
          body: |
            ## SolarGuard ${{ github.ref_name }}

            ### What's new
            <!-- Add release notes here -->

            ### Installing
            1. Download the APK from the [EAS Build dashboard](https://expo.dev)
            2. Transfer to your Android phone
            3. Enable "Install from unknown sources" in Settings
            4. Install the APK

            ### Requirements
            - Android 8.0+ (API 26+)
            - SolarOS account with a registered inverter system

          draft: false
          prerelease: ${{ !startsWith(github.ref_name, 'v') || contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
