name: Build & Release SolarGuard APK

on:
  # Trigger on version tags like v1.0.0, v1.2.3
  push:
    tags:
      - 'v*.*.*'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK locally on GitHub
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Set up Java for Android build ──────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 5. Install Android NDK ────────────────────────────────────────────
      - name: Install exact NDK version
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006"

      # ── 6. Generate Native Android Code (Prebuild) ────────────────────────
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      # ── 7. Build the APK using Gradle ─────────────────────────────────────
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── 8. Upload APK Artifact ────────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SolarGuard-APK-${{ github.ref_name || github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
