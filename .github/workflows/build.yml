name: Build & Release SolarGuard APK

on:
  # Trigger on version tags like v1.0.0, v1.2.3
  push:
    tags:
      - 'v*.*.*'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK locally on GitHub
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Set up Java for Android build ──────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 5. Install Android NDK ────────────────────────────────────────────
      - name: Install exact NDK version
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006"

      # ── 6. Generate Native Android Code (Prebuild) ────────────────────────
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      # ── 7. Build the APK using Gradle ─────────────────────────────────────
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── 8. Create GitHub Release and Upload APK ───────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SolarGuard ${{ github.ref_name }}
          files: android/app/build/outputs/apk/release/app-release.apk
          body: |
            ## SolarGuard ${{ github.ref_name }}

            ### Installing
            1. Download the `app-debug.apk` file attached below
            2. Transfer to your Android phone
            3. Enable "Install from unknown sources" in Settings
            4. Install the APK

            ### Requirements
            - Android 8.0+ (API 26+)
            - SolarOS account with a registered inverter system

          draft: false
          prerelease: ${{ !startsWith(github.ref_name, 'v') || contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
